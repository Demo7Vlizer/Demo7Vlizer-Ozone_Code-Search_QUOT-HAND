<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Handwriting vs Typed Comparison</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="dark">
    <header class="topbar">
      <div class="topbar__title">
        <h1>Image Comparison + Search</h1>
        <p>Filter by handwritten text and/or typed product code.</p>
      </div>

      <div class="topbar__controls">
        <label class="field">
          <span class="field__label">Search</span>
          <input id="searchInput" class="field__input" type="text" placeholder="Type handwriting text or product code..." autocomplete="off" />
        </label>

        <div class="checks" role="group" aria-label="Search fields">
          <label class="check">
            <input id="matchHandwritten" type="checkbox" checked />
            <span>Handwritten</span>
          </label>
          <label class="check">
            <input id="matchTyped" type="checkbox" checked />
            <span>Typed / Product Code</span>
          </label>
        </div>

        <label class="check check--theme" title="Toggle light/dark mode">
          <input id="themeToggle" type="checkbox" />
          <span>Night mode</span>
        </label>

        <div class="meta" aria-live="polite">
          <span id="resultsCount">0 results</span>
        </div>
      </div>
    </header>

    <main class="container">
      <div id="errorBox" class="error" hidden></div>
      <div id="emptyBox" class="empty" hidden>
        No items found. Add entries to <code>items.json</code>.
      </div>

      <section id="itemsGrid" class="grid" aria-label="Image comparison items"></section>
    </main>

    <template id="itemTemplate">
      <article class="card">
        <header class="card__header">
          <div class="pillRow">
            <span class="pill pill--hand">Handwriting</span>
            <span class="pill pill--typed">Typed</span>
          </div>
          <div class="card__titles">
            <div class="card__title">
              <span class="label">Handwriting:</span>
              <span class="handText"></span>
            </div>
            <div class="card__title">
              <span class="label">Product code:</span>
              <span class="typedCode"></span>
            </div>
          </div>
        </header>

        <div class="pair" role="group" aria-label="Handwriting and typed images">
          <div class="pair__images">
            <div class="pair__col">
              <div class="pair__colLabel">Handwriting</div>
              <div class="pair__viewer pair__viewer--hand">
                <img class="pair__img pair__img--hand" alt="Handwriting image" />
              </div>
            </div>

            <div class="pair__col">
              <div class="pair__colLabel">Typed / Product Code</div>
              <div class="pair__viewer pair__viewer--typed">
                <img class="pair__img pair__img--typed" alt="Typed image" />
              </div>
            </div>
          </div>

          <div class="zoomRow">
            <div class="zoomCell">
              <div class="zoomRow__label">Handwriting zoom</div>
              <input class="zoomRow__range zoomRow__range--hand" type="range" min="80" max="300" step="10" value="170" />
              <div class="zoomRow__value">
                <span class="zoomRow__percent zoomRow__percent--hand">170%</span>
              </div>
            </div>

            <div class="zoomCell">
              <div class="zoomRow__label">Typed zoom</div>
              <input class="zoomRow__range zoomRow__range--typed" type="range" min="80" max="300" step="10" value="170" />
              <div class="zoomRow__value">
                <span class="zoomRow__percent zoomRow__percent--typed">170%</span>
              </div>
            </div>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
